version: '1.0'
repository:
  type: single-language
  mappings: {}
defaults:
  language: python
  runtime: '3.12'
  package_manager: poetry
  test_framework: pytest
  linter:
  - ruff
  - flake8
  - pylint
  - mypy
  formatter:
  - ruff
  coverage:
    line: 80
    branch: 70
    function: 90
    statement: 85
    mutation: 80
    path: 60
  repo_type: single-language
  test_runner: pytest
