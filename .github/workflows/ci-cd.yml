name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - 'feat/**'
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PACKAGE_NAME: promptcli
  PYTHON_MIN_VERSION: "3.10"

jobs:
  # =============================================================================
  # PHASE 1: TEST
  # =============================================================================

  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.x"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Run Ruff linter
        run: uv run ruff check --output-format=github .

      - name: Run Ruff format check
        run: uv run ruff format --check .

      - name: Run type checking with mypy
        run: uv run mypy promptcli --ignore-missing-imports

  unit-tests:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.x"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Run unit tests with coverage
        run: |
          uv run pytest tests/unit \
            --cov=promptcli \
            --cov-report=xml \
            --cov-report=html \
            --junitxml=test-results/unit-test-results-${{ matrix.python-version }}.xml \
            -v

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.python-version }}
          path: |
            test-results/unit-test-results-${{ matrix.python-version }}.xml
            htmlcov/
            coverage.xml
          retention-days: 30

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.x"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Run integration tests
        run: |
          uv run pytest tests/integration \
            --junitxml=test-results/integration-test-results.xml \
            -v

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: test-results/integration-test-results.xml
          retention-days: 30

  security-tests:
    name: Security Tests
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.x"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Run security tests
        run: |
          uv run pytest tests/security \
            --junitxml=test-results/security-test-results.xml \
            -v

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-test-results
          path: test-results/security-test-results.xml
          retention-days: 30

  slow-tests:
    name: Slow Tests
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/feat/')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.x"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Run slow tests
        run: |
          uv run pytest tests/slow \
            --junitxml=test-results/slow-test-results.xml \
            -v

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: slow-test-results
          path: test-results/slow-test-results.xml
          retention-days: 30

  # =============================================================================
  # PHASE 2: BUILD
  # =============================================================================

  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [integration-tests, security-tests]
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for version calculation

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.x"
          enable-cache: true

      - name: Calculate semantic version
        id: version
        run: |
          python .github/scripts/calculate_version.py
        env:
          GITHUB_REF: ${{ github.ref }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}

      - name: Update version in pyproject.toml
        run: |
          sed -i 's/^version = "0.1.0"/version = "${{ steps.version.outputs.version }}"/' pyproject.toml

      - name: Build package
        run: uv build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

      - name: Test package installability
        run: |
          python -m venv test_env
          source test_env/bin/activate
          pip install dist/*.whl
          # Verify CLI is accessible
          prompt --help
          # Verify package can be imported
          python -c "import promptcli; print(f'promptcli version: {promptcli.__version__}')"
        shell: bash

  # =============================================================================
  # PHASE 3: PUBLISH (Test PyPI for feat branches)
  # =============================================================================

  publish-test-pypi:
    name: Publish to Test PyPI
    runs-on: ubuntu-latest
    needs: [build, slow-tests]
    if: startsWith(github.ref, 'refs/heads/feat/')
    environment:
      name: testpypi
      url: https://test.pypi.org/p/${{ env.PACKAGE_NAME }}
    permissions:
      id-token: write  # Required for trusted publishing
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to Test PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  # =============================================================================
  # PHASE 3: PUBLISH (PyPI for main branch)
  # =============================================================================

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build, slow-tests]
    if: github.ref == 'refs/heads/main'
    environment:
      name: pypi
      url: https://pypi.org/p/${{ env.PACKAGE_NAME }}
    permissions:
      id-token: write  # Required for trusted publishing
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: false

  # =============================================================================
  # PHASE 4: VERIFY PUBLISH
  # =============================================================================

  verify-test-pypi:
    name: Verify Test PyPI Publish
    runs-on: ubuntu-latest
    needs: publish-test-pypi
    if: startsWith(github.ref, 'refs/heads/feat/')
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Wait for package availability
        run: sleep 30

      - name: Install from Test PyPI and verify
        run: |
          python -m venv verify_env
          source verify_env/bin/activate
          pip install \
            --index-url https://test.pypi.org/simple/ \
            --extra-index-url https://pypi.org/simple/ \
            ${{ env.PACKAGE_NAME }}==${{ needs.build.outputs.version }}
          # Verify CLI works
          prompt --help
          # Verify import works
          python -c "import promptcli; print(f'Successfully installed promptcli {promptcli.__version__}')"
        shell: bash

  verify-pypi:
    name: Verify PyPI Publish
    runs-on: ubuntu-latest
    needs: publish-pypi
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Wait for package availability
        run: sleep 60

      - name: Install from PyPI and verify
        run: |
          python -m venv verify_env
          source verify_env/bin/activate
          pip install ${{ env.PACKAGE_NAME }}==${{ needs.build.outputs.version }}
          # Verify CLI works
          prompt --help
          # Verify import works
          python -c "import promptcli; print(f'Successfully installed promptcli {promptcli.__version__}')"
        shell: bash

  # =============================================================================
  # SUMMARY
  # =============================================================================

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, security-tests]
    if: always()
    steps:
      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          path: test-results
          pattern: test-results-*

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: test-results/**/*.xml
          check_name: Test Results Summary
