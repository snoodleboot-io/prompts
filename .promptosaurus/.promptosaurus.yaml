version: '1.0'
repository:
  type: single-language
  mappings: {}
spec:
  language: python
  runtime: '3.14'
  package_manager: uv
  test_framework: hybrid
  linter:
  - ruff
  - pyright
  formatter:
  - ruff
  coverage: strict
  test_runner: pytest
  abstract_class_style: interface
  mocking_library:
  - none
  coverage_tool: pytest-cov
  mutation_tool: mutmut
